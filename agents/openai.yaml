interface:
  display_name: "Trip Canvas"
  short_description: "引导生成多风格旅行手帐、版式草图、对象地图和本地工作台"
  default_prompt: "Use $trip-canvas to guide me from my travel photos, itinerary, notes, tickets, and memories into an editable multi-style travel scrapbook or visual journal. Ask only the key missing questions, propose visual routes and component/object drafts, automatically create a low-fidelity layout and object-map preview when image generation is available, then help me generate the final page, export prompts, or launch the local GUI workbench."

policy:
  allow_implicit_invocation: true
